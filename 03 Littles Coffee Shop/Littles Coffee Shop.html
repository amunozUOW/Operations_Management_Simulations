<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little\'s Coffee Shop Simulation</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap">
<style data-uow-tokens>
:root {
  --uow-font: 'Montserrat', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
  --uow-navy: #001641;
  --uow-red: #ED0A00;
  --uow-copper: #A15A35;
  --uow-ice: #E3F1F9;
  --uow-cream: #F4ECDB;
  --uow-grey: #5C657B;
  --uow-box: #F0F2F5;
  --uow-green: #2E7D32;
}
</style>
</head>
<body>

<div id="littles-coffee-sim-v2" style="display: flex; flex-direction: column; gap: 14px; font-family: var(--uow-font); max-width: 1200px; margin: 0 auto; padding: 16px; color: #001641; line-height: 1.5;">

    <!-- ROW 1: Title + Phase Progress -->
    <div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px;">
        <h2 style="margin: 0; font-size: 1.5em; color: #001641;">Little\'s Coffee Shop</h2>
        <div id="phaseIndicator" style="display: flex; gap: 4px; align-items: center;">
            <span id="phaseLabel1" style="padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: #001641; color: #fff; white-space: nowrap;">Phase 1: Staffing</span>
            <span style="color: #5C657B;">&#9654;</span>
            <span id="phaseLabel2" style="padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: #F0F2F5; color: #5C657B; white-space: nowrap;">Phase 2: Uncertainty</span>
            <span style="color: #5C657B;">&#9654;</span>
            <span id="phaseLabel3" style="padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: #F0F2F5; color: #5C657B; white-space: nowrap;">Phase 3: Sequential Ops</span>
        </div>
    </div>

    <!-- ROW 2: Instruction Panel -->
    <div id="instructionPanel" style="background: #E3F1F9; border-left: 4px solid #001641; border-radius: 0 8px 8px 0; padding: 14px 18px; line-height: 1.4; position: relative;">
        <div style="display: flex; justify-content: space-between; align-items: start;">
            <div id="instructionContent"></div>
            <button id="toggleInstructions" onclick="void(0)" style="position: absolute; top: 10px; right: 14px; background: none; border: none; color: #001641; font-family: var(--uow-font); font-size: 0.75rem; font-weight: 600; cursor: pointer; text-decoration: underline;">Show less</button>
        </div>
    </div>

    <!-- ROW 3: LEFT (Controls + Metrics) | RIGHT (Staff Status + Chart) -->
    <div style="display: flex; flex-wrap: wrap; gap: 10px;">

        <!-- LEFT COLUMN: Controls + Metrics stacked -->
        <div style="flex: 0 0 320px; min-width: 280px; display: flex; flex-direction: column; gap: 10px;">

            <!-- Controls Panel -->
            <div id="controlsPanel" style="background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);">
                <div style="font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; color: #001641;">Your Decisions</div>
                <div id="controlsArea"></div>
                <div style="display: flex; gap: 10px; margin-top: 8px;">
                    <button id="goBtn" onclick="void(0)" style="flex: 1; padding: 12px; background: #001641; color: #fff; border: none; border-radius: 8px; font-family: var(--uow-font); font-size: 0.85rem; font-weight: 700; cursor: pointer;">Go</button>
                    <button id="resetBtn" onclick="void(0)" style="padding: 12px 16px; background: #5C657B; color: #fff; border: none; border-radius: 8px; font-family: var(--uow-font); font-size: 0.85rem; font-weight: 700; cursor: pointer;">Reset</button>
                </div>
            </div>

            <!-- Metrics Dashboard -->
            <div id="metricsPanel" style="background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);">
                <div style="font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; color: #001641;">Run <span id="runCounter">0</span> Results</div>
                <div id="metricsArea" style="display: flex; flex-wrap: wrap; gap: 8px; width: 100%;"></div>
            </div>

        </div>

        <!-- RIGHT COLUMN: Staff Status + Chart -->
        <div style="flex: 1; min-width: 340px; display: flex; flex-direction: column; gap: 6px;">

            <!-- Staff Status -->
            <div id="staffStatusArea" style="background: #fff; border-radius: 10px; padding: 12px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);">
                <div style="display: flex; justify-content: space-between; align-items: start;">
                    <div>
                        <div style="font-weight: 700; font-size: 0.85rem; color: #001641; margin-bottom: 4px;">Staff Status</div>
                        <div id="staffStatusContent"></div>
                    </div>
                    <div style="display: flex; gap: 10px; font-size: 0.75rem; color: #5C657B; align-items: center; padding-top: 2px;">
                        <div style="display: flex; align-items: center; gap: 4px;">
                            <div style="width: 14px; height: 14px; background: #001641; border: 1px solid #333; border-radius: 3px;"></div> Busy
                        </div>
                        <div style="display: flex; align-items: center; gap: 4px;">
                            <div style="width: 14px; height: 14px; background: #E3F1F9; border: 1px solid #333; border-radius: 3px;"></div> Idle
                        </div>
                    </div>
                </div>
            </div>

            <!-- Queue Chart (pedagogical centerpiece) -->
            <div style="position: relative; flex: 1; min-height: 300px;">
                <canvas id="queueChart"></canvas>
            </div>

        </div>

    </div>

    <!-- ROW 4: Run History (collapsed by default) -->
    <div id="historySection">
        <div id="historyToggleBar" onclick="void(0)" style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #F0F2F5; border: none; border-radius: 10px; cursor: pointer; user-select: none;">
            <span id="historyToggleLabel" style="font-size: 0.85rem; font-weight: 600; color: #5C657B;">Run History (0 runs)</span>
            <span id="historyToggleArrow" style="font-size: 0.8em; color: #5C657B;">&#9654;</span>
        </div>
        <div id="historyContent" style="display: none; overflow-x: auto; margin-top: 4px;">
            <table id="historyTable" style="width: 100%; border-collapse: collapse; font-size: 0.72rem;">
                <thead>
                    <tr id="historyHeader" style="background: #001641;"></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <!-- ROW 5: Discussion Insights Panel -->
    <div id="insightsPanel" style="background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <div style="font-weight: 700; font-size: 0.95rem; color: #001641;">Discussion Insights</div>
            <div id="insightsCounter" style="font-size: 0.85rem; color: #5C657B; font-weight: 600;">0 of 10</div>
        </div>
        <div id="insightsList" style="display: flex; flex-direction: column; gap: 0px;"></div>
        <div id="phaseAdvanceArea" style="display: none; margin-top: 8px; padding: 16px; background: #E8F5E9; border-radius: 10px; text-align: center;"></div>
        <div id="overrideControls" style="margin-top: 12px; padding-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;"></div>
    </div>

</div>

<script>
    (function() {
        'use strict';

        var STORAGE_KEY = 'ops802_littles_coffee_v2';

        // === CHECKPOINT SCHEDULE ===
        var CHECKPOINT_SCHEDULE = [{
                phase: 1,
                turn: 1,
                insightIndex: 0
            },
            {
                phase: 1,
                turn: 2,
                insightIndex: 1
            },
            {
                phase: 1,
                turn: 3,
                insightIndex: 2
            },
            {
                phase: 1,
                turn: 3,
                insightIndex: 3
            },
            {
                phase: 2,
                turn: 3,
                insightIndex: 4
            },
            {
                phase: 2,
                turn: 5,
                insightIndex: 5
            },
            {
                phase: 2,
                turn: 8,
                insightIndex: 6
            },
            {
                phase: 3,
                turn: 1,
                insightIndex: 7
            },
            {
                phase: 3,
                turn: 2,
                insightIndex: 8
            },
            {
                phase: 3,
                turn: 3,
                insightIndex: 9
            }
        ];

        var PHASE_INSIGHTS = {
            1: [0, 1, 2, 3],
            2: [4, 5, 6],
            3: [7, 8, 9]
        };

        // === ORDERED INSIGHTS ===
        var insights = [{
                id: 1,
                question: "What happens to the queue when you ran the model with 1 barista? Can 1 barista handle 55 customers in 60 minutes?",
                answer: "No. 55 customers × 2 min = 110 minutes of work, but one barista only has 60 minutes available. They can serve about 30 customers before time runs out. The queue grows continuously because demand exceeds capacity.",
                action: null
            },
            {
                id: 2,
                question: "What changes when there are 2 baristas? How does the queue behave compared to 1 barista?",
                answer: "2 baristas provide 120 minutes of total capacity — just enough to cover the 110 minutes of work (55 × 2). The queue stays small/nonexistent. Since we can't change staffing mid-shift, we round up: if one barista isn't enough, we need two for the full hour, even if the second isn't busy the entire time.",
                action: null
            },
            {
                id: 3,
                question: "How does the queue differ from 2 to 3 baristas? What's the trade-off?",
                answer: "With 3 baristas, the queue is zero — customers are served almost immediately. But one barista is often idle. This is the capacity-vs-efficiency trade-off: fewer staff means higher workload per person but risk of queuing; more staff means better service but lower productivity.",
                action: null
            },
            {
                id: 4,
                question: "What is the utilisation for 1, 2, and 3 baristas? Formula: Utilisation = (Customers × Service Time) / (Duration × Staff).",
                answer: "1 barista: 110/60 = 183% (impossible — queue grows). 2 baristas: 110/120 = 91.7% (near capacity). 3 baristas: 110/180 = 61.1% (substantial idle time).",
                action: function() {
                    renderMetrics();
                    updateLiveDisplay();
                    renderHistoryHeader();
                    rerenderHistory();
                }
            },
            {
                id: 5,
                question: "After a few runs, what did you observe? Remember that demand varies each run (30–85 customers).",
                answer: "2 baristas can handle about 60 customers (120 min / 2 min each). When demand exceeds ~60, queues build. Runs with high demand draws (toward 85) cause significant queuing.",
                action: null
            },
            {
                id: 6,
                question: "Calculate staff needed for the best case (30 customers) and worst case (85 customers).",
                answer: "Best case (30): 30 × 2 = 60 min → 1 barista needed. Worst case (85): 85 × 2 = 170 min → rounding up 170/60 = 3 baristas. The range is 1–3 staff — you never need 4 or 5. But note: 1 barista only works when exactly 30 customers arrive, a 1-in-56 chance (~1.8%). So 1 barista is not a viable staffing plan.",
                action: null
            },
            {
                id: 7,
                question: "What is the trade-off between 2 vs 3 baristas? Think productivity (utilisation) vs customer satisfaction (queue length).",
                answer: "2 baristas: high productivity (~92% util at average demand) but queues form on high-demand days. 3 baristas: lower productivity (~61%) but handles all scenarios.",
                action: function() {
                    renderMetrics();
                    updateLiveDisplay();
                    renderHistoryHeader();
                    rerenderHistory();
                }
            },
            {
                id: 8,
                question: "Watch all three queue lines on the chart. Which station's queue grows fastest? Why?",
                answer: "For example, if you selected 1 staff per station, Preparation (3 min service time) grows fastest. At 1 staff it can only process about 80 customers in 240 min, far below the 170 needed (and it becomes the bottleneck).",
                action: null
            },
            {
                id: 9,
                question: "Apply Little's Law to each station independently. For 170 customers in 240 min, how many staff at each?",
                answer: "Order Taking: 170×2=340 min, rounding up 340/240 = 2 staff. Preparation: 170×3=510 min, rounding up 510/240 = 3 staff. Serving: 170×1=170 min, rounding up 170/240 = 1 staff. So staffing (2, 3, 1), total = 6 staff.",
                action: function() {
                    renderMetrics();
                    updateLiveDisplay();
                    renderHistoryHeader();
                    rerenderHistory();
                }
            },
            {
                id: 10,
                question: "Try mismatched staffing (e.g., Order=3, Prep=2). What happens? Is a queue always bad — when might waiting benefit the business?",
                answer: "The bottleneck shifts to Preparation. Orders arrive faster than prep can handle — a \"shifting bottleneck.\" Queues can enable cross-selling (e.g., customers see pastries while waiting) while zero queue may indicate overstaffing.",
                action: function() {
                    renderMetrics();
                    updateLiveDisplay();
                    renderHistoryHeader();
                    rerenderHistory();
                }
            }
        ];

        // === STATE ===
        var state = {
            currentPhase: 1,
            currentRun: 0,
            phaseTurns: 0,
            questionsShown: 0,
            insightsRevealed: 0,
            instructionExpanded: true,
            history: [],
            lastSliders: { staff: 1, orderStaff: 1, prepStaff: 1, serveStaff: 1 },
            historyExpanded: false
        };

        // === SIMULATION STATE ===
        var sim = {
            queue: [], inService: new Map(), staff: [], completedCustomers: [],
            arrivalTimestamps: [], simulatedTime: 0, isRunning: false, intervalId: null,
            maxQueueLength: 0, totalStaffMinutes: 0, targetCustomers: 55,
            queues: { orderTaking: [], preparation: [], serving: [] },
            inServiceMulti: { orderTaking: new Map(), preparation: new Map(), serving: new Map() },
            staffMulti: { orderTaking: [], preparation: [], serving: [] },
            maxQueues: { orderTaking: 0, preparation: 0, serving: 0 },
            totalStaffMinutesMulti: { orderTaking: 0, preparation: 0, serving: 0 }
        };

        var el = {};

        function cacheDom() {
            el.goBtn = document.getElementById('goBtn');
            el.resetBtn = document.getElementById('resetBtn');
            el.controlsArea = document.getElementById('controlsArea');
            el.metricsArea = document.getElementById('metricsArea');
            el.staffStatusContent = document.getElementById('staffStatusContent');
            el.runCounter = document.getElementById('runCounter');
            el.instructionContent = document.getElementById('instructionContent');
            el.toggleInstructions = document.getElementById('toggleInstructions');
            el.historyHeader = document.getElementById('historyHeader');
            el.historyBody = document.getElementById('historyBody');
            el.historyToggleBar = document.getElementById('historyToggleBar');
            el.historyToggleLabel = document.getElementById('historyToggleLabel');
            el.historyToggleArrow = document.getElementById('historyToggleArrow');
            el.historyContent = document.getElementById('historyContent');
            el.phaseLabel1 = document.getElementById('phaseLabel1');
            el.phaseLabel2 = document.getElementById('phaseLabel2');
            el.phaseLabel3 = document.getElementById('phaseLabel3');
            el.insightsCounter = document.getElementById('insightsCounter');
            el.insightsList = document.getElementById('insightsList');
            el.phaseAdvanceArea = document.getElementById('phaseAdvanceArea');
            el.overrideControls = document.getElementById('overrideControls');
        }

        // === CHART ===
        var queueChartInstance = null;
        function destroyChart() { if (queueChartInstance) { queueChartInstance.destroy(); queueChartInstance = null; } }

        function initChart() {
            destroyChart();
            var ctx = document.getElementById('queueChart').getContext('2d');
            var datasets;
            if (state.currentPhase <= 2) {
                datasets = [{ label: 'Queue Length', data: [], borderColor: '#001641', borderWidth: 2, fill: false, pointRadius: 0 }];
            } else {
                datasets = [
                    { label: 'Order Taking', data: [], borderColor: '#001641', borderWidth: 2, fill: false, pointRadius: 0 },
                    { label: 'Preparation', data: [], borderColor: '#001641', borderWidth: 2, fill: false, pointRadius: 0 },
                    { label: 'Serving', data: [], borderColor: '#7BA3E0', borderWidth: 2, fill: false, pointRadius: 0 }
                ];
            }
            queueChartInstance = new Chart(ctx, {
                type: 'line', data: { labels: [], datasets: datasets },
                options: {
                    animation: false, responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: 'Time (minutes)', font: { size: 14, weight: 'bold' } }, grid: { display: true, color: '#e5e5e5', lineWidth: 0.5 }, border: { width: 1.5, color: '#333' }, ticks: { font: { size: 12 } } },
                        y: { beginAtZero: true, title: { display: true, text: 'Customers in Queue', font: { size: 14, weight: 'bold' } }, grid: { color: '#e5e5e5', lineWidth: 0.5 }, border: { width: 1.5, color: '#333' }, ticks: { font: { size: 12 } } }
                    },
                    plugins: { legend: { display: state.currentPhase === 3 } }
                }
            });
        }

        function updateChart() {
            if (!queueChartInstance) return;
            queueChartInstance.data.labels.push(sim.simulatedTime);
            if (state.currentPhase <= 2) {
                queueChartInstance.data.datasets[0].data.push(sim.queue.length);
            } else {
                queueChartInstance.data.datasets[0].data.push(sim.queues.orderTaking.length);
                queueChartInstance.data.datasets[1].data.push(sim.queues.preparation.length);
                queueChartInstance.data.datasets[2].data.push(sim.queues.serving.length);
            }
            if (queueChartInstance.data.labels.length > 60) {
                queueChartInstance.data.labels.shift();
                queueChartInstance.data.datasets.forEach(function(ds) { ds.data.shift(); });
            }
            queueChartInstance.update('none');
        }

        // === INSTRUCTION TEXT ===
        var instructionText = {
            1: {
                full: '<div style="font-weight: 700; font-size: 1em; margin-bottom: 4px; color: #001641;">Phase 1: The Staffing Decision</div>' +
                    '<div style="margin-bottom: 4px;">Little\'s Coffee Shop experiences a morning rush from 8–9 AM. <strong>55 customers</strong> are expected to arrive in the hour. Each coffee takes exactly <strong>2 minutes</strong> to prepare, and a barista can only prepare one drink at a time.</div>' +
                    '<div style="margin-bottom: 3px;">Key information:</div>' +
                    '<ul style="margin: 0 0 4px 0; padding-left: 20px; line-height: 1.4;">' +
                    '<li>Arrival rate: ~55 customers per hour (~0.92 customers/min)</li>' +
                    '<li>Service time: <strong>2 minutes per customer</strong> (fixed)</li>' +
                    '<li>Each barista serves one customer at a time</li>' +
                    '<li>The simulation runs for 60 minutes (1 hour)</li></ul>' +
                    '<div style="color: #001641; font-weight: 600;">Your task: Start with 1 barista and observe what happens. Commit to your staffing decision for the full hour — changing mid-shift is disruptive. After each run, reflect on the outcome and try a different level. Can you work out the minimum number of baristas needed?</div>',
                short: '<span style="font-weight: 700; color: #001641;">Phase 1:</span> 55 customers, 2 min/customer, 60 min rush. Commit to a staffing level each run. Can you find the minimum baristas needed?'
            },
            2: {
                full: '<div style="font-weight: 700; font-size: 1em; margin-bottom: 4px; color: #001641;">Phase 2: Demand Uncertainty</div>' +
                    '<div style="margin-bottom: 4px;">The coffee shop now faces <strong>uncertain demand</strong>. Each day, somewhere between <strong>30 and 85 customers</strong> arrive during the rush hour (uniformly distributed). The service time is still 2 minutes per customer.</div>' +
                    '<div style="margin-bottom: 3px;">Key changes from Phase 1:</div>' +
                    '<ul style="margin: 0 0 4px 0; padding-left: 20px; line-height: 1.4;">' +
                    '<li>Demand varies <strong>each run</strong> — you won\'t know the exact number until it happens</li>' +
                    '<li>Service time is still 2 minutes per customer</li></ul>' +
                    '<div style="color: #001641; font-weight: 600;">Your task: Run the simulation multiple times. How do you staff when demand is uncertain? Can you calculate the range of staff you might need?</div>',
                short: '<span style="font-weight: 700; color: #001641;">Phase 2:</span> Demand varies 30–85 customers/hour. How do you staff for uncertainty?'
            },
            3: {
                full: '<div style="font-weight: 700; font-size: 1em; margin-bottom: 4px; color: #001641;">Phase 3: Sequential Operations</div>' +
                    '<div style="margin-bottom: 4px;">As customer volume grows, simply adding baristas to one counter is not enough. The shop has split its operation into <strong>three specialised sequential stations</strong> to improve throughput and allow targeted staffing. Each customer passes through all three in order. You need to serve <strong>170 customers</strong> over a <strong>4-hour shift</strong> (240 minutes).</div>' +
                    '<div style="margin-bottom: 3px;">The three stations:</div>' +
                    '<ul style="margin: 0 0 4px 0; padding-left: 20px; line-height: 1.4;">' +
                    '<li><strong>Order Taking:</strong> 2 minutes per customer</li>' +
                    '<li><strong>Preparation:</strong> 3 minutes per customer (grinding, brewing, steaming)</li>' +
                    '<li><strong>Serving:</strong> 1 minute per customer</li></ul>' +
                    '<div style="margin-bottom: 3px;">Each station has its own queue and staff. Customers must finish one station before moving to the next. <strong>Unlike Phases 1 and 2, you can adjust staffing mid-shift</strong> — use the sliders while the simulation is running and watch how queues respond in real time.</div>',
                short: '<span style="font-weight: 700; color: #001641;">Phase 3:</span> Three stations (Order 2min, Prep 3min, Serve 1min), 170 customers in 240 min. You can adjust staffing mid-shift.'
            }
        };

        // === METRIC CARD ===
        function metricCard(id, label, unit) {
            var html = '<div id="metric_' + id + '" style="flex: 1; min-width: 110px; padding: 12px 14px; border-radius: 10px; text-align: center; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.08);">';
            html += '<div style="font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #5C657B; margin-bottom: 2px;">' + label + '</div>';
            html += '<div style="display: flex; align-items: baseline; justify-content: center; gap: 2px;">';
            html += '<div id="' + id + 'Value" style="font-size: 1.15rem; font-weight: 700; color: #001641;">&mdash;</div>';
            if (unit) html += '<div style="font-size: 0.65rem; color: #5C657B;">' + unit + '</div>';
            html += '</div></div>';
            return html;
        }

        // === METRIC VISIBILITY THRESHOLDS ===
        function isUtilRevealed() {
            if (state.currentPhase === 1) return false;
            return true;
        }
        function isWRevealed() {
            if (state.currentPhase === 1) return false;
            return true;
        }

        // === RENDER CONTROLS ===
        function renderControls() {
            var html = '';
            if (state.currentPhase <= 2) {
                html += '<div style="margin-bottom: 10px;">';
                html += '<label style="display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; color: #001641;">Number of Baristas: <span id="staffDisplay" style="color: #001641; font-size: 1.1em;">1</span></label>';
                html += '<input type="range" id="staffSlider" min="1" max="5" value="1" step="1" style="width: 100%; cursor: pointer;">';
                html += '<div style="display: flex; justify-content: space-between; font-size: 0.75em; color: #5C657B;"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div></div>';
            } else {
                var sliders = [
                    { id: 'orderStaff', label: 'Order Taking Staff' },
                    { id: 'prepStaff', label: 'Preparation Staff' },
                    { id: 'serveStaff', label: 'Serving Staff' }
                ];
                for (var i = 0; i < sliders.length; i++) {
                    html += '<div style="margin-bottom: 8px;">';
                    html += '<label style="display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 3px; color: #001641;">' + sliders[i].label + ': <span id="' + sliders[i].id + 'Display" style="color: #001641;">1</span></label>';
                    html += '<input type="range" id="' + sliders[i].id + 'Slider" min="1" max="5" value="1" step="1" style="width: 100%; cursor: pointer;">';
                    html += '<div style="display: flex; justify-content: space-between; font-size: 0.75em; color: #5C657B;"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div></div>';
                }
            }
            el.controlsArea.innerHTML = html;
            bindControlEvents();
        }

        // === RENDER METRICS ===
        function renderMetrics() {
            var html = '';
            if (state.currentPhase <= 2) {
                html += metricCard('queueLen', 'Queue Length', 'customers');
                html += metricCard('inService', 'In Service', 'customers');
                html += metricCard('totalArrivals', 'Total Arrived', 'customers');
                html += metricCard('totalServed', 'Total Served', 'customers');

        // === STAFF STATUS ===
        function renderStaffStatus() {
            var html = '';
            function statusBox(sm) {
                var bg = sm.busy ? '#001641' : '#E3F1F9';
                var fg = sm.busy ? '#fff' : '#001641';
                var num = sm.id.split('_')[1];
                if (sm.markedForRemoval) return '<div style="width:24px;height:24px;background-color:' + bg + ';color:' + fg + ';border:2px dashed #ED0A00;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.7em;font-weight:600;opacity:0.4;transition:all 0.3s ease;" title="Finishing last customer, then leaving">' + num + '</div>';
                return '<div style="width:24px;height:24px;background-color:' + bg + ';color:' + fg + ';border:2px solid #333;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.7em;font-weight:600;transition:all 0.3s ease;">' + num + '</div>';
            }

                    var arr = sim.staffMulti[stations[s].key];
                    for (var j = 0; j < arr.length; j++) html += statusBox(arr[j]);
                    html += '</div>';

        }

        function createStaff(prefix, count) {
            var arr = [];
            for (var i = 0; i < count; i++) arr.push({ id: prefix + '_' + (i + 1), busy: false, totalBusyTime: 0, currentStartTime: null, markedForRemoval: false });
            return arr;
        }

        function adjustStaffArray(staffArray, prefix, desiredCount) {
            var current = staffArray.length;
            if (desiredCount > current) {
                var maxNum = 0;
                for (var i = 0; i < staffArray.length; i++) { var num = parseInt(staffArray[i].id.split('_')[1]); if (num > maxNum) maxNum = num; }
                for (var j = 0; j < desiredCount - current; j++) { maxNum++; staffArray.push({ id: prefix + '_' + maxNum, busy: false, totalBusyTime: 0, currentStartTime: null, markedForRemoval: false }); }
            } else if (desiredCount < current) {
                var toRemove = current - desiredCount, removed = 0;
                for (var k = staffArray.length - 1; k >= 0 && removed < toRemove; k--) { if (!staffArray[k].busy && !staffArray[k].markedForRemoval) { staffArray.splice(k, 1); removed++; } }
                for (var m = staffArray.length - 1; m >= 0 && removed < toRemove; m--) { if (staffArray[m].busy && !staffArray[m].markedForRemoval) { staffArray[m].markedForRemoval = true; removed++; } }
            }
            var activeCount = 0;
            for (var n = 0; n < staffArray.length; n++) { if (!staffArray[n].markedForRemoval) activeCount++; }
            var prevActive = -1;
            while (activeCount < desiredCount) {
                if (activeCount === prevActive) break; prevActive = activeCount;
                for (var p = 0; p < staffArray.length; p++) { if (staffArray[p].markedForRemoval) { staffArray[p].markedForRemoval = false; activeCount++; break; } }
            }
        }

        function setSliderLocked(locked) {

            if (!slider) return;
            slider.disabled = locked; slider.style.opacity = locked ? '0.4' : '1'; slider.style.cursor = locked ? 'not-allowed' : 'pointer';
        }

        function syncStaffToSlider() {
            if (state.currentPhase <= 2) return;
            if (!sim.isRunning && sim.simulatedTime === 0) return;
            var mappings = [{ slider: 'orderStaffSlider', staff: 'orderTaking', prefix: 'ORDER' }, { slider: 'prepStaffSlider', staff: 'preparation', prefix: 'PREP' }, { slider: 'serveStaffSlider', staff: 'serving', prefix: 'SERVE' }];
            for (var i = 0; i < mappings.length; i++) { var s = document.getElementById(mappings[i].slider); if (!s) continue; adjustStaffArray(sim.staffMulti[mappings[i].staff], mappings[i].prefix, parseInt(s.value)); }
            renderStaffStatus();
        }

        function resetSimState() {
            if (sim.intervalId) clearInterval(sim.intervalId);
            sim.queue = []; sim.inService = new Map(); sim.completedCustomers = []; sim.arrivalTimestamps = [];
            sim.simulatedTime = 0; sim.isRunning = false; sim.intervalId = null; sim.maxQueueLength = 0; sim.totalStaffMinutes = 0;
            sim.totalStaffMinutesMulti = { orderTaking: 0, preparation: 0, serving: 0 };
            sim.targetCustomers = state.currentPhase === 2 ? Math.floor(30 + Math.random() * 56) : 55;
            if (state.currentPhase <= 2) {
                var slider = document.getElementById('staffSlider');
                sim.staff = createStaff('STAFF', slider ? parseInt(slider.value) : 1);
            } else {
                sim.queues = { orderTaking: [], preparation: [], serving: [] };
                sim.inServiceMulti = { orderTaking: new Map(), preparation: new Map(), serving: new Map() };
                sim.maxQueues = { orderTaking: 0, preparation: 0, serving: 0 };
                var os = document.getElementById('orderStaffSlider'), ps = document.getElementById('prepStaffSlider'), ss = document.getElementById('serveStaffSlider');
                sim.staffMulti.orderTaking = createStaff('ORDER', os ? parseInt(os.value) : 1);
                sim.staffMulti.preparation = createStaff('PREP', ps ? parseInt(ps.value) : 1);
                sim.staffMulti.serving = createStaff('SERVE', ss ? parseInt(ss.value) : 1);
            }
        }

        // === SINGLE STATION SIM ===
        function singleStationGenerateCustomer() {
            sim.queue.push({ id: Math.random().toString(36).substr(2, 9), arrivalTime: sim.simulatedTime, serviceStartTime: null, completionTime: null });
            sim.arrivalTimestamps.push(sim.simulatedTime);
        }

        function singleStationProcessQueue() {
            var SERVICE_TIME = 2, toDelete = [], staffToRemove = [];
            for (var entry of sim.inService) {
                if (sim.simulatedTime >= entry[1].completionTime) {
                    var sm = null;
                    for (var s = 0; s < sim.staff.length; s++) { if (sim.staff[s].id === entry[1].staffId) { sm = sim.staff[s]; break; } }
                    if (sm) { sm.totalBusyTime += (sim.simulatedTime - sm.currentStartTime); sm.currentStartTime = null; if (sm.markedForRemoval) staffToRemove.push(sm); else sm.busy = false; }
                    entry[1].customer.completionTime = sim.simulatedTime; sim.completedCustomers.push(entry[1].customer); toDelete.push(entry[0]);
                }
            }
            for (var d = 0; d < toDelete.length; d++) sim.inService.delete(toDelete[d]);
            for (var r = 0; r < staffToRemove.length; r++) { var idx = sim.staff.indexOf(staffToRemove[r]); if (idx > -1) sim.staff.splice(idx, 1); }
            for (var i = 0; i < sim.staff.length; i++) {
                if (!sim.staff[i].busy && !sim.staff[i].markedForRemoval && sim.queue.length > 0) {
                    var cust = sim.queue.shift(); sim.staff[i].busy = true; sim.staff[i].currentStartTime = sim.simulatedTime; cust.serviceStartTime = sim.simulatedTime;
                    sim.inService.set(cust.id, { customer: cust, staffId: sim.staff[i].id, completionTime: sim.simulatedTime + SERVICE_TIME });
                }
            }
            if (sim.queue.length > sim.maxQueueLength) sim.maxQueueLength = sim.queue.length;
        }

        function singleStationTick() {
            sim.simulatedTime += 1; sim.totalStaffMinutes += sim.staff.length;
            if (sim.simulatedTime >= 60) { completeRun(); return; }
            if (state.currentPhase === 1) {
                var rate = 59 / 55, variation = rate * (Math.random() - 0.5) * 0.08;
                if (Math.random() < 1 / (rate + variation)) singleStationGenerateCustomer();
            } else {
                var bpm = sim.targetCustomers / 59, arrivals = Math.random() < (bpm % 1) ? Math.ceil(bpm) : Math.floor(bpm);
                arrivals = Math.min(arrivals, 2, sim.targetCustomers - sim.arrivalTimestamps.length);
                for (var a = 0; a < arrivals; a++) singleStationGenerateCustomer();
            }
            singleStationProcessQueue(); updateLiveDisplay(); updateChart();
        }

        // === THREE-STATION SIM ===
        var SERVICE_TIMES = { orderTaking: 2, preparation: 3, serving: 1 };

        function threeStationGenerateCustomer() {
            var c = { id: Math.random().toString(36).substr(2, 9), arrivalTime: sim.simulatedTime, currentStation: 'orderTaking', orderStartTime: null, orderEndTime: null, prepStartTime: null, prepEndTime: null, serveStartTime: null, completionTime: null };
            sim.queues.orderTaking.push(c); sim.arrivalTimestamps.push(sim.simulatedTime);
        }

        function processStation(station) {
            var queue = sim.queues[station], inSvc = sim.inServiceMulti[station], staff = sim.staffMulti[station], st = SERVICE_TIMES[station];
            var toDelete = [], staffToRemove = [];
            for (var entry of inSvc) {
                if (sim.simulatedTime >= entry[1].completionTime) {
                    var sm = null;
                    for (var s = 0; s < staff.length; s++) { if (staff[s].id === entry[1].staffId) { sm = staff[s]; break; } }
                    if (sm) { sm.totalBusyTime += (sim.simulatedTime - sm.currentStartTime); sm.currentStartTime = null; if (sm.markedForRemoval) staffToRemove.push(sm); else sm.busy = false; }
                    var cust = entry[1].customer;
                    if (station === 'orderTaking') { cust.orderEndTime = sim.simulatedTime; cust.currentStation = 'preparation'; sim.queues.preparation.push(cust); }
                    else if (station === 'preparation') { cust.prepEndTime = sim.simulatedTime; cust.currentStation = 'serving'; sim.queues.serving.push(cust); }
                    else { cust.completionTime = sim.simulatedTime; sim.completedCustomers.push(cust); }
                    toDelete.push(entry[0]);
                }
            }
            for (var d = 0; d < toDelete.length; d++) inSvc.delete(toDelete[d]);
            for (var r = 0; r < staffToRemove.length; r++) { var idx = staff.indexOf(staffToRemove[r]); if (idx > -1) staff.splice(idx, 1); }
            for (var i = 0; i < staff.length; i++) {
                if (!staff[i].busy && !staff[i].markedForRemoval && queue.length > 0) {
                    var c = queue.shift(); staff[i].busy = true; staff[i].currentStartTime = sim.simulatedTime;
                    if (station === 'orderTaking') c.orderStartTime = sim.simulatedTime;
                    else if (station === 'preparation') c.prepStartTime = sim.simulatedTime;
                    else c.serveStartTime = sim.simulatedTime;
                    inSvc.set(c.id, { customer: c, staffId: staff[i].id, completionTime: sim.simulatedTime + st });
                }
            }
            if (queue.length > sim.maxQueues[station]) sim.maxQueues[station] = queue.length;
        }

        function threeStationTick() {
            sim.simulatedTime += 1;
            sim.totalStaffMinutesMulti.orderTaking += sim.staffMulti.orderTaking.length;
            sim.totalStaffMinutesMulti.preparation += sim.staffMulti.preparation.length;
            sim.totalStaffMinutesMulti.serving += sim.staffMulti.serving.length;
            if (sim.simulatedTime >= 240) { completeRun(); return; }
            if (Math.random() < 1 / (240 / 170)) threeStationGenerateCustomer();
            processStation('orderTaking'); processStation('preparation'); processStation('serving');
            updateLiveDisplay(); updateChart();
        }

        // === CALCULATIONS ===
        function calcUtilSingle() {
            if (sim.simulatedTime === 0) return 0;
            var busy = sim.completedCustomers.length * 2 + sim.inService.size * 2;
            var avail = sim.totalStaffMinutes > 0 ? sim.totalStaffMinutes : sim.simulatedTime * sim.staff.length;
            return Math.min((busy / avail) * 100, 100).toFixed(1);
        }
        function calcLambda() { return sim.simulatedTime === 0 ? 0 : (sim.arrivalTimestamps.length / sim.simulatedTime).toFixed(2); }
        function calcW() {
            if (sim.completedCustomers.length === 0) return 0;
            var total = 0;
            for (var i = 0; i < sim.completedCustomers.length; i++) total += sim.completedCustomers[i].completionTime - sim.completedCustomers[i].arrivalTime;
            return (total / sim.completedCustomers.length).toFixed(2);
        }
        function calcStationUtil(station) {
            if (sim.simulatedTime === 0) return 0;
            var staff = sim.staffMulti[station], totalBusy = 0;
            for (var i = 0; i < staff.length; i++) { totalBusy += staff[i].totalBusyTime; if (staff[i].busy) totalBusy += sim.simulatedTime - staff[i].currentStartTime; }
            var avail = sim.totalStaffMinutesMulti[station] > 0 ? sim.totalStaffMinutesMulti[station] : sim.simulatedTime * staff.length;
            return Math.min((totalBusy / avail) * 100, 100).toFixed(1);
        }
        function calcAggUtil() {
            if (sim.simulatedTime === 0) return 0;
            var orderU = parseFloat(calcStationUtil('orderTaking'));
            var prepU = parseFloat(calcStationUtil('preparation'));
            var serveU = parseFloat(calcStationUtil('serving'));
            return ((orderU + prepU + serveU) / 3).toFixed(1);
        }

        // === LIVE DISPLAY ===
        function updateLiveDisplay() {
            var setVal = function(id, val) { var e = document.getElementById(id + 'Value'); if (e) e.textContent = val; };
            if (state.currentPhase <= 2) {
                setVal('queueLen', sim.queue.length); setVal('inService', sim.inService.size);
                setVal('totalArrivals', sim.arrivalTimestamps.length); setVal('totalServed', sim.completedCustomers.length);
                setVal('arrivalRate', calcLambda()); setVal('simTime', sim.simulatedTime);
                if (isUtilRevealed()) setVal('utilisation', sim.simulatedTime < 15 ? '—' : calcUtilSingle());
                if (isWRevealed()) setVal('avgTime', sim.simulatedTime < 15 ? '—' : calcW());
            } else {
                setVal('totalQueue', sim.queues.orderTaking.length + sim.queues.preparation.length + sim.queues.serving.length);
                setVal('inService', sim.inServiceMulti.orderTaking.size + sim.inServiceMulti.preparation.size + sim.inServiceMulti.serving.size);
                setVal('totalArrivals', sim.arrivalTimestamps.length); setVal('totalServed', sim.completedCustomers.length);
                setVal('arrivalRate', calcLambda()); setVal('simTime', sim.simulatedTime);
                if (isUtilRevealed()) { var warmUp = sim.simulatedTime < 15; setVal('orderUtil', warmUp ? '—' : calcStationUtil('orderTaking')); setVal('prepUtil', warmUp ? '—' : calcStationUtil('preparation')); setVal('serveUtil', warmUp ? '—' : calcStationUtil('serving')); setVal('aggUtil', warmUp ? '—' : calcAggUtil()); }
                if (isWRevealed()) setVal('avgTime', sim.simulatedTime < 15 ? '—' : calcW());
            }
            renderStaffStatus();
        }

        // === RUN MANAGEMENT ===
        function startRun() {
            resetSimState();
            renderStaffStatus(); initChart(); setSliderLocked(true); sim.isRunning = true; el.goBtn.textContent = 'Pause';
            sim.intervalId = setInterval(state.currentPhase <= 2 ? singleStationTick : threeStationTick, 1000);
        }
        function pauseRun() { if (sim.intervalId) { clearInterval(sim.intervalId); sim.intervalId = null; } sim.isRunning = false; el.goBtn.textContent = 'Resume'; }
        function resumeRun() { sim.isRunning = true; el.goBtn.textContent = 'Pause'; sim.intervalId = setInterval(state.currentPhase <= 2 ? singleStationTick : threeStationTick, 1000); }

        function completeRun() {
            if (sim.intervalId) { clearInterval(sim.intervalId); sim.intervalId = null; }
            sim.isRunning = false; setSliderLocked(false); updateLiveDisplay(); updateChart();
            var result = {};
            if (state.currentPhase <= 2) {
                result = { run: state.history.length + 1, phase: state.currentPhase, staff: sim.staff.length, arrivals: sim.arrivalTimestamps.length, served: sim.completedCustomers.length, maxQueue: sim.maxQueueLength, avgTime: parseFloat(calcW()), utilisation: parseFloat(calcUtilSingle()) };
                if (state.currentPhase === 2) result.targetCustomers = sim.targetCustomers;
            } else {
                result = { run: state.history.length + 1, phase: 3, orderStaff: sim.staffMulti.orderTaking.length, prepStaff: sim.staffMulti.preparation.length, serveStaff: sim.staffMulti.serving.length, arrivals: sim.arrivalTimestamps.length, served: sim.completedCustomers.length, maxQueueOrder: sim.maxQueues.orderTaking, maxQueuePrep: sim.maxQueues.preparation, maxQueueServe: sim.maxQueues.serving, orderUtil: parseFloat(calcStationUtil('orderTaking')), prepUtil: parseFloat(calcStationUtil('preparation')), serveUtil: parseFloat(calcStationUtil('serving')), aggUtil: parseFloat(calcAggUtil()), avgTime: parseFloat(calcW()) };
            }
            state.history.push(result); state.currentRun++; state.phaseTurns++;
            if (state.currentPhase <= 2) { state.lastSliders.staff = sim.staff.length; }

        function renderPhaseAdvance() {
            var phase = state.currentPhase, pi = PHASE_INSIGHTS[phase], maxIdx = pi[pi.length - 1];
            if (state.insightsRevealed > maxIdx && phase < 3) {
                el.phaseAdvanceArea.style.display = 'block';
                el.phaseAdvanceArea.innerHTML = '<div style="font-size: 0.85rem; font-weight: 600; color: #2E7D32; margin-bottom: 8px;">All Phase ' + phase + ' discussion points completed!</div>' +
                    '<button id="advancePhaseBtn" onclick="void(0)" style="padding: 10px 24px; background: #2E7D32; color: #fff; border: none; border-radius: 8px; font-family: var(--uow-font); font-size: 0.85rem; font-weight: 700; cursor: pointer;">Continue to Phase ' + (phase + 1) + ' &#9654;</button>';
            } else { el.phaseAdvanceArea.style.display = 'none'; el.phaseAdvanceArea.innerHTML = ''; }
        }

        function renderOverrides() {
            var ls = 'background: none; border: none; color: #5C657B; cursor: pointer; font-size: 0.78em; padding: 2px 6px; text-decoration: underline;';
            var html = '';
            if (state.currentPhase < 2) html += '<button id="overrideSkip2" onclick="void(0)" style="' + ls + '">Skip to Phase 2</button>';
            if (state.currentPhase < 3) html += '<button id="overrideSkip3" onclick="void(0)" style="' + ls + '">Skip to Phase 3</button>';
            html += '<button id="overrideRevealQ" onclick="void(0)" style="' + ls + '">Reveal Next Question</button>';
            html += '<button id="overrideReset" onclick="void(0)" style="' + ls + '">Full Reset</button>';
            el.overrideControls.innerHTML = html;
        }

        function checkForNewQuestion() {
            if (state.questionsShown > state.insightsRevealed) return;
            for (var i = 0; i < CHECKPOINT_SCHEDULE.length; i++) {
                var cp = CHECKPOINT_SCHEDULE[i];
                if (cp.phase === state.currentPhase && cp.turn <= state.phaseTurns && cp.insightIndex >= state.questionsShown) {
                    state.questionsShown = cp.insightIndex + 1; renderInsights(); return;
                }
            }
        }

        function revealInsightAnswer(index) {
            if (index !== state.insightsRevealed || index >= state.questionsShown) return;
            state.insightsRevealed = index + 1;
            var insight = insights[index];
            if (typeof insight.action === 'function') insight.action();
            checkForNewQuestion(); renderInsights(); saveState();
        }

        function advancePhase() { if (state.currentPhase >= 3) return; if (sim.intervalId) clearInterval(sim.intervalId); sim.isRunning = false; setPhase(state.currentPhase + 1); }

        function skipToPhase(target) {
            if (target <= state.currentPhase || target > 3) return;
            for (var p = state.currentPhase; p < target; p++) {
                var pi = PHASE_INSIGHTS[p], maxIdx = pi[pi.length - 1];
                if (state.questionsShown <= maxIdx) state.questionsShown = maxIdx + 1;
                while (state.insightsRevealed <= maxIdx) { var ins = insights[state.insightsRevealed]; state.insightsRevealed++; if (typeof ins.action === 'function') ins.action(); }
            }
            if (sim.intervalId) clearInterval(sim.intervalId); sim.isRunning = false; setPhase(target);
        }

        function revealNextQuestion() { if (state.questionsShown >= insights.length) return; state.questionsShown++; renderInsights(); saveState(); }

        // === PHASE MANAGEMENT ===
        function setPhase(phase) {
            state.currentPhase = phase; state.phaseTurns = 0;
            state.history = state.history.filter(function(r) { return r.phase !== phase; });
            var colors = { active: '#001641', completed: '#16a34a', upcoming: '#F0F2F5' };
            var textColors = { active: '#fff', completed: '#fff', upcoming: '#5C657B' };
            var names = { 1: 'Phase 1: Staffing', 2: 'Phase 2: Uncertainty', 3: 'Phase 3: Sequential Ops' };
            [1, 2, 3].forEach(function(p) {
                var s = p === phase ? 'active' : p < phase ? 'completed' : 'upcoming';
                var lbl = document.getElementById('phaseLabel' + p); lbl.style.background = colors[s]; lbl.style.color = textColors[s]; lbl.textContent = names[p];
            });
            if (sim.intervalId) clearInterval(sim.intervalId); sim.simulatedTime = 0; sim.isRunning = false; el.goBtn.textContent = 'Go';
            renderControls(); resetSimState(); renderMetrics(); renderStaffStatus(); initChart(); renderHistoryHeader(); rerenderHistory(); renderInstructions(); renderInsights();
            el.runCounter.textContent = state.currentRun; saveState();
        }

        function renderInstructions() {
            var inst = instructionText[state.currentPhase];
            el.instructionContent.innerHTML = state.instructionExpanded ? inst.full : inst.short;
            el.toggleInstructions.textContent = state.instructionExpanded ? 'Show less' : 'Show more';
            var bc = { 1: '#001641', 2: '#001641', 3: '#001641' }, bg = { 1: '#E3F1F9', 2: '#E3F1F9', 3: '#E3F1F9' };
            var panel = document.getElementById('instructionPanel'); panel.style.borderLeftColor = bc[state.currentPhase]; panel.style.background = bg[state.currentPhase];
        }

        // === PERSISTENCE ===
        function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {} }
        function loadState() {
            try {
                var saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    state = JSON.parse(saved);
                    if (state.questionsShown === undefined) state.questionsShown = state.insightsRevealed || 0;
                    if (state.phaseTurns === undefined) state.phaseTurns = 0;
                    if (state.instructionExpanded === undefined) state.instructionExpanded = true;
                    if (state.lastSliders === undefined) state.lastSliders = { staff: 1, orderStaff: 1, prepStaff: 1, serveStaff: 1 };
                    if (state.historyExpanded === undefined) state.historyExpanded = false;
                    return true;
                }
            } catch (e) { localStorage.removeItem(STORAGE_KEY); }
            return false;
        }

        function restoreFromState() {
            setPhase(state.currentPhase); el.runCounter.textContent = state.currentRun;
            if (state.lastSliders) {
                if (state.currentPhase <= 2) {
                    var sl = document.getElementById('staffSlider'), di = document.getElementById('staffDisplay');
                    if (sl && di) { sl.value = state.lastSliders.staff || 1; di.textContent = state.lastSliders.staff || 1; }
                } else {
                    var pairs = [{ slider: 'orderStaffSlider', display: 'orderStaffDisplay', key: 'orderStaff' }, { slider: 'prepStaffSlider', display: 'prepStaffDisplay', key: 'prepStaff' }, { slider: 'serveStaffSlider', display: 'serveStaffDisplay', key: 'serveStaff' }];
                    for (var i = 0; i < pairs.length; i++) { var s = document.getElementById(pairs[i].slider), d = document.getElementById(pairs[i].display), v = state.lastSliders[pairs[i].key] || 1; if (s && d) { s.value = v; d.textContent = v; } }
                }
            }
            rerenderHistory(); el.historyContent.style.display = state.historyExpanded ? 'block' : 'none'; el.historyToggleArrow.innerHTML = state.historyExpanded ? '&#9660;' : '&#9654;'; renderInsights();
        }

        function resetSim() {
            localStorage.removeItem(STORAGE_KEY); if (sim.intervalId) clearInterval(sim.intervalId);
            state = { currentPhase: 1, currentRun: 0, phaseTurns: 0, questionsShown: 0, insightsRevealed: 0, instructionExpanded: true, history: [], lastSliders: { staff: 1, orderStaff: 1, prepStaff: 1, serveStaff: 1 }, historyExpanded: false };
            sim.simulatedTime = 0; sim.isRunning = false; el.goBtn.textContent = 'Go'; setPhase(1);
        }

        function bindControlEvents() {
            if (state.currentPhase <= 2) {
                var sl = document.getElementById('staffSlider'), di = document.getElementById('staffDisplay');
                if (sl && di) sl.addEventListener('input', function() { di.textContent = this.value; sim.staff = createStaff('STAFF', parseInt(this.value)); renderStaffStatus(); });
            } else {
                var pairs = [{ slider: 'orderStaffSlider', display: 'orderStaffDisplay' }, { slider: 'prepStaffSlider', display: 'prepStaffDisplay' }, { slider: 'serveStaffSlider', display: 'serveStaffDisplay' }];
                for (var i = 0; i < pairs.length; i++) { (function(p) { var s = document.getElementById(p.slider), d = document.getElementById(p.display); if (s && d) s.addEventListener('input', function() { d.textContent = this.value; syncStaffToSlider(); }); })(pairs[i]); }
            }
        }

        function bindEvents() {
            el.goBtn.addEventListener('click', toggleSimulation);
            el.resetBtn.addEventListener('click', resetSim);
            el.toggleInstructions.addEventListener('click', function() { state.instructionExpanded = !state.instructionExpanded; renderInstructions(); saveState(); });
            el.historyToggleBar.addEventListener('click', toggleHistory);
            document.getElementById('insightsPanel').addEventListener('click', function(e) {
                var rev = e.target.closest('[data-reveal-index]');
                if (rev) { revealInsightAnswer(parseInt(rev.getAttribute('data-reveal-index'))); return; }
                if (e.target.id === 'advancePhaseBtn') { advancePhase(); return; }
                if (e.target.id === 'overrideSkip2') { skipToPhase(2); return; }
                if (e.target.id === 'overrideSkip3') { skipToPhase(3); return; }
                if (e.target.id === 'overrideRevealQ') { revealNextQuestion(); return; }
                if (e.target.id === 'overrideReset') { resetSim(); return; }
            });
        }

        function init() {
            cacheDom(); bindEvents();
            if (loadState()) restoreFromState(); else setPhase(1);
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();

    })();
</script>

</body>
</html>
